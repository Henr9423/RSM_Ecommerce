<!DOCTYPE html>
<html>
  <head>
    <title>React Basics</title>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>

    <script src="react-basics.js"></script>

    <script type="text/babel">
      const container = document.querySelector('.js-container');
      const button= <button>hello</button>
      const paragraph= <p>paragraph of text</p>
      function ProductDetails({itemText, price, discountPrice, imgSrc}) {
       

        return(
        <div>
            <img src={imgSrc} width="100" />
            <p>{itemText}</p>
            <p>{discountPrice!=null ? (<del>Price:{price}</del>) : (<>Price:{price}</>)}</p>
            {discountPrice!=null && <p>Discount price: {discountPrice}</p>}
            <button>Add to Cart</button>
       </div>

        );
      }


      function App() {

        return (
          <>
            <ProductDetails itemText="CottonSocks" price="$10.90" discountPrice="$5.45" imgSrc="cotton-socks.png" />
            <ProductDetails itemText="Tennis balls" price="$6.00" imgSrc="plain-t-shirt.png" />
            <ProductDetails itemText="Plain T-Shirt" price="$7.99" imgSrc="tennis-balls.png" />
            
          
          </>
        );
      }

       
        

      ReactDOM.createRoot(container).render(<App />);
      
    </script>
  </body>
</html>
